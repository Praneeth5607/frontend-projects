<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>Live Attendance Tracker</h1>
        </div>

        <div class="content">
            <h3>Enter number of slots</h3>
           <input type="text" id="totalSlots" placeholder="Enter number of Total slots">
            <h3>Enter number of slots you attendended</h3>
           <input type="text" id="attendedSlots" placeholder="Enter number of slots attendented">
            
           <button onclick="submit()">Submit</button>
        </div>
    </div>
     <div class="result">
         <div class="percent">
             <p>Percentage</p><hr>
             <p id="percent_display"></p>
         </div>
         <div class="percent">
             <p>You can skip</p><hr>
             <p id="skip"></p>
         </div>
         
     </div>
    <script src="script.js"></script>
</body>
</html>
